name: jamboo
description: "Jamboo Food Delivery App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  cloud_firestore: ^6.0.2
  google_sign_in: ^6.2.1
  image_picker: ^1.1.2
  firebase_storage: ^13.0.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  http: ^1.2.1
  intl: ^0.20.2


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/